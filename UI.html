<!DOCTYPE html>
<html>
<head>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

button{
    width:460px;
    height:280px;
    font-size:60px;
    font-weight:bold;
    color:white;
    border:none;
    cursor:pointer;
    background:gray;
}
</style>
</head>

<body>

<button onclick="changeColor()">Click here</button>

<script>
function changeColor(){
    document.querySelector("button").style.backgroundColor = "tomato";
}
</script>

</body>
</html>
